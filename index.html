<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Almanac — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    <div class="topbar">
      <div class="brand"><b>Almanac</b> · sky &amp; instrument readings</div>
      <div class="controls">
        <div class="unit-toggle">
          <button id="unitC" class="active">°C</button>
          <button id="unitF">°F</button>
        </div>
        <form class="search-form" id="searchForm" autocomplete="off">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchInput" type="text" placeholder="Search city…" />
          <div class="search-results" id="searchResults"></div>
        </form>
      </div>
    </div>

    <div id="app">
      <div class="state-msg">Reading the sky…</div>
    </div>

    <footer>Data · Open‑Meteo — updated on load</footer>
  </div>

<script src="storage.js"></script>
<script src="weather.js"></script>
<script src="charts.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
